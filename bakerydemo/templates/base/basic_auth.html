{% load i18n %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>{% trans "Authentication Required" %}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        {# Prevent the demo site from being indexed #}
        <meta name="robots" content="noindex" />

        <style>
            h1 { font-size: 3rem; }
            body { font: 1rem sans-serif; color: #333; }
            article { display: block; text-align: center; margin: 0 auto; }
            a { color: #2e1f5e; }
            a:hover { color: #333; }
        </style>
    </head>

    <body>
        <article>
            <h1>{% trans "Authentication Required" %}</h1>
            <p>{% trans "You must login to view this site" %}</p>
            <h3>{% blocktrans %}Looking for Wagtail? Visit <a href="https://wagtail.org">wagtail.org</a>.{% endblocktrans %}</h3>
        </article>
    </body>
</html>
