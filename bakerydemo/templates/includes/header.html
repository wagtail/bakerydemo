{% load navigation_tags wagtailcore_tags %}

<header class="header clearfix">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="container">
        <div class="navigation" data-navigation>
            <a href="/" class="navigation__logo">The Wagtail Bakery</a>

            <button
                type="button"
                class="navigation__mobile-toggle"
                aria-label="Toggle mobile menu"
                aria-expanded="false"
                data-mobile-navigation-toggle
            >
                <span class="navigation__toggle-icon-bar"></span>
                <span class="navigation__toggle-icon-bar"></span>
                <span class="navigation__toggle-icon-bar"></span>
            </button>

            {% get_site_root as site_root %}

            <div class="navigation__desktop">
                <ul class="navigation__items nav nav-pills">
                    {% top_menu parent=site_root calling_page=self %}
                </ul>
                <button
                    type="button"
                    class="theme-toggle"
                    data-theme-toggle
                >
                    Toggle theme
                </button>
                <div class="navigation__search">
                    <form action="{% url 'search' %}" method="get" role="search">
                        <label class="u-sr-only" for="search">Search the bakery</label>
                        <button type="submit" class="navigation__search-icon" aria-label="Search">
                            <span aria-hidden="true">⌕</span>
                        </button>
                        <input type="search" name="q" id="search" class="navigation__search-input" placeholder="Search">
                        <button type="reset" id="search-clear" class="search-clear-btn is-hidden" aria-label="Clear search">×</button>
                    </form>
                </div>
            </div>

            <div class="navigation__mobile" data-mobile-navigation hidden>
                <div class="navigation__mobile-search">
                    <form action="{% url 'search' %}" method="get" role="search">
                        <label class="u-sr-only" for="mobile-search-input">Search the bakery</label>
                        <input type="search" name="q" id="mobile-search-input" class="navigation__search-input" placeholder="Search">
                        <button type="reset" id="search-clear-mobile" class="search-clear-btn is-hidden" aria-label="Clear search">×</button>
                        <button type="submit" class="navigation__search-icon" aria-label="Search">
                            <span aria-hidden="true">⌕</span>
                        </button>
                    </form>
                </div>
                <button
                    type="button"
                    class="theme-toggle"
                    data-theme-toggle
                >
                    Toggle theme
                </button>
                <ul class="navigation__items nav nav-pills">
                    {% top_menu parent=site_root calling_page=self %}
                </ul>
            </div>
        </div>
    </div>
</header>
