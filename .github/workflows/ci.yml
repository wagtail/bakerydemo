name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.16'
          python-version: '3.12'
          enable-cache: true
      - run: uv venv .venv
      - run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - run: uv pip install --python .venv/bin/python -r requirements/development.txt
      - run: make lint-server
  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: make lint-client
  test-server:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: bakerydemo.settings.test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.16'
          python-version: '3.12'
          enable-cache: true
      - run: uv venv .venv
      - run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
      - run: uv pip install --python .venv/bin/python -r requirements/development.txt
      - run: ./manage.py check
      - run: ./manage.py makemigrations --check --noinput
      - run: ./manage.py test
